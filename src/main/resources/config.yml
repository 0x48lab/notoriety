# Notoriety Configuration

# Language setting (ja or en)
locale: ja

# Ownership settings
ownership:
  # Number of days before ownership expires when owner hasn't logged in
  # Set to 0 to disable expiration
  expiration-days: 30

# Guild settings
guild:
  # Cost to create a guild (set to 0 for free)
  creation-cost: 5000

# Territory settings
territory:
  # Maximum number of chunks a guild can own
  max-chunks: 10
  # Number of members required per chunk (10 = 1 chunk per 10 members)
  members-per-chunk: 10

# Theft settings
theft:
  # Base alignment penalty per theft (per container session)
  base-penalty: 5
  # Escalation penalties for repeated theft against the same victim (within reset window)
  # 1st theft = base-penalty, 2nd = 10, 3rd = 20, 4th+ = 50
  escalation-penalties:
    - 10
    - 20
    - 50
  # Time in seconds before escalation resets (default: 1 hour)
  escalation-reset-seconds: 3600

# Indirect PK prevention settings
indirect-pk:
  # Enable/disable indirect PK detection
  enabled: true
  # Tracking duration in seconds (how long to track hazard placements)
  tracking-duration-seconds: 10
  # Maximum distance in blocks between hazard and death location
  max-distance-blocks: 32
  # Which hazards to track
  tracking:
    lava: true
    tnt: true
    fall: true
    piston: false  # P3: Future implementation
    water: false   # P3: Future implementation

# Database configuration
database:
  # Database type: sqlite or mysql
  type: sqlite

  # SQLite settings (used when type: sqlite)
  sqlite:
    file: "data.db"

  # MySQL settings (used when type: mysql)
  mysql:
    host: "localhost"
    port: 3306
    database: "notoriety"
    username: "minecraft"
    password: "password"
    pool:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
